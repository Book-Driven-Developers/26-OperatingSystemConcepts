<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">준비 큐에서 CPU로 디스패치되고, CPU에서 종료·시간 초과·I/O 요청·인터럽트 대기·자식 fork로 분기하여 각 큐와 자원을 거친 뒤 다시 준비 큐로 복귀하는 프로세스 스케줄링 흐름을 나타낸 큐잉 다이어그램.</desc>
